spring:
  profiles:
    active: dev
  application:
    name: booking-monolith

  main:
    allow-circular-references: false

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/booking_monolith
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    entity-packages-to-scan: io.bookingmonolith.flight,io.bookingmonolith.passenger,io.bookingmonolith.booking
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        column_ordering_strategy: legacy
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties.hibernate.format_sql: false

  otel:
    collector:
      service-name: booking-monolith
      service-version: 1.0.0
      endpoint: http://localhost:4317

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/keycloak-realm/protocol/openid-connect/certs
